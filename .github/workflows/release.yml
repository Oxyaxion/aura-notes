name: Release

on:
  push:
    tags:
      - 'v*'

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ''
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: linux-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-linux-x86_64

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: clef-note-linux-x86_64

  build-freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6  # v1
        with:
          usesh: true
          prepare: pkg install -y rust node npm
          run: |
            cd frontend
            npm ci
            VITE_API_BASE='' npm run build
            cd ../backend
            cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-freebsd-x86_64

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: clef-note-freebsd-x86_64
